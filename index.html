<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherApp - Clima en Línea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ASSETS/SCSS/main.css">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f7f6; }
        .hero-section { background: linear-gradient(135deg, #007bff, #00d4ff); color: white; padding: 60px 0; }
        .card { transition: transform 0.3s ease; border-radius: 15px; }
        .card:hover { transform: translateY(-10px); }
        .btn-primary { border-radius: 25px; padding: 8px 25px; }
    </style>
</head>
<body>

    <header class="hero-section text-center shadow-sm">
        <div class="container">
            <h1 class="display-4 fw-bold">Estado del Tiempo</h1>
            <p class="lead">Región de Tarapacá, Chile</p>
        </div>
    </header>

    <main class="container my-5">
        <div id="localidades" class="row">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
                <p class="mt-2">Obteniendo datos meteorológicos...</p>
            </div>
        </div>
    </main>

    <footer class="bg-white py-4 mt-auto border-top">
        <div class="container text-center">
            <span class="text-muted">© 2026 WeatherApp POO - Desarrollado con OpenWeather API</span>
        </div>
    </footer>

    <script src="ASSETS/JS/WeatherService.js"></script>
    <script src="ASSETS/JS/WeatherApp.js"></script>
    <script src="ASSETS/JS/main.js"></script>
</body>
</html>
